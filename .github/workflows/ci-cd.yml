name: CI/CD GitOps

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

env:
  REGISTRY: crpi-pleclmjo9htj5t3x.cn-hangzhou.personal.cr.aliyuncs.com
  IMAGE_NAME: crpi-pleclmjo9htj5t3x.cn-hangzhou.personal.cr.aliyuncs.com/devops-cicd-demo/devops-cicd-demo

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt

      - name: Run tests
        run: |
          PYTHONPATH=$GITHUB_WORKSPACE pytest tests/

  build-and-update-manifest:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set target environment
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "TARGET_ENV=prod" >> $GITHUB_ENV
            echo "MANIFEST_PATH=k8s/prod/deployment.yaml" >> $GITHUB_ENV
          elif [ "${GITHUB_REF_NAME}" = "dev" ]; then
            echo "TARGET_ENV=dev" >> $GITHUB_ENV
            echo "MANIFEST_PATH=k8s/dev/deployment.yaml" >> $GITHUB_ENV
          else
            echo "Unsupported branch: ${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Kubernetes manifest
        run: |
          echo "Target environment: $TARGET_ENV"
          echo "Manifest path: $MANIFEST_PATH"

          sed -i "s#image: .*devops-cicd-demo.*#image: $IMAGE_NAME:${{ github.sha }}#g" $MANIFEST_PATH

          echo "Updated image:"
          grep "image:" $MANIFEST_PATH

      - name: Commit and push manifest change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add $MANIFEST_PATH

          if git diff --cached --quiet; then
            echo "No manifest changes to commit."
          else
            git commit -m "chore: update $TARGET_ENV image to ${{ github.sha }} [skip ci]"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi