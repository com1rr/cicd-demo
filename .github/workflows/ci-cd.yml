name: CI/CD GitOps

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

env:
  REGISTRY: crpi-pleclmjo9htj5t3x.cn-hangzhou.personal.cr.aliyuncs.com
  IMAGE_NAME: crpi-pleclmjo9htj5t3x.cn-hangzhou.personal.cr.aliyuncs.com/devops-cicd-demo/devops-cicd-demo
  PROD_MANIFEST: k8s/prod/deployment.yaml

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt

      - name: Run tests
        run: |
          PYTHONPATH=$GITHUB_WORKSPACE pytest tests/

  build-and-update-manifest:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update prod Kubernetes manifest
        run: |
          echo "Updating image tag in $PROD_MANIFEST"

          sed -i "s#image: .*devops-cicd-demo.*#image: $IMAGE_NAME:${{ github.sha }}#g" $PROD_MANIFEST

          echo "Updated manifest:"
          grep "image:" $PROD_MANIFEST

      - name: Commit and push manifest change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add $PROD_MANIFEST

          if git diff --cached --quiet; then
            echo "No manifest changes to commit."
          else
            git commit -m "chore: update prod image to ${{ github.sha }} [skip ci]"
            git push
          fi