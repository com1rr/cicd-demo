apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-cicd-demo
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-cicd-demo
  template:
    metadata:
      labels:
        app: devops-cicd-demo
    spec:
      imagePullSecrets:
        - name: acr-secret
      containers:
        - name: devops-cicd-demo
          image: crpi-pleclmjo9htj5t3x.cn-hangzhou.personal.cr.aliyuncs.com/devops-cicd-demo/devops-cicd-demo:5ab35b46217bc89656662037074fbe2fc81cd955
          imagePullPolicy: Always
          env:
          - name: ENV_NAME
            valueFrom:
              configMapKeyRef:
                name: devops-cicd-demo-config
                key: ENV_NAME
          ports:
            - containerPort: 5000