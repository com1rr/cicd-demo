apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-cicd-demo
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-cicd-demo
  template:
    metadata:
      labels:
        app: devops-cicd-demo
    spec:
      imagePullSecrets:
        - name: acr-secret
      containers:
        - name: devops-cicd-demo
          image: crpi-pleclmjo9htj5t3x.cn-hangzhou.personal.cr.aliyuncs.com/devops-cicd-demo/devops-cicd-demo:faa20f6f03d332714d28e6974d53b6eb619e95a6
          imagePullPolicy: Always
          env:
          - name: ENV_NAME
            value: "dev"
          ports:
            - containerPort: 5000