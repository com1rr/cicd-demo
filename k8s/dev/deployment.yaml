apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-cicd-demo
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-cicd-demo
  template:
    metadata:
      labels:
        app: devops-cicd-demo
    spec:
      imagePullSecrets:
        - name: acr-secret
      containers:
        - name: devops-cicd-demo
          image: crpi-pleclmjo9htj5t3x.cn-hangzhou.personal.cr.aliyuncs.com/devops-cicd-demo/devops-cicd-demo:ec022562fa737a923b127d670384957c6bd4f60a
          imagePullPolicy: Always
          env:
          - name: ENV_NAME
            valueFrom:
              configMapKeyRef:
                name: devops-cicd-demo-config
                key: ENV_NAME
          - name: DEMO_SECRET
            valueFrom:
              secretKeyRef:
                name: devops-cicd-demo-secret
                key: DEMO_SECRET
          ports:
            - containerPort: 5000