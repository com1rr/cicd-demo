apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-cicd-demo
  namespace: prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-cicd-demo
  template:
    metadata:
      labels:
        app: devops-cicd-demo
    spec:
      imagePullSecrets:
        - name: acr-secret
      containers:
        - name: devops-cicd-demo
          image: crpi-pleclmjo9htj5t3x.cn-hangzhou.personal.cr.aliyuncs.com/devops-cicd-demo/devops-cicd-demo:29367e1b4d5e50f736a5b75f0990c936ca739a21
          imagePullPolicy: Always
          env:
          - name: ENV_NAME
            valueFrom:
              configMapKeyRef:
                name: devops-cicd-demo-config
                key: ENV_NAME
          ports:
            - containerPort: 5000